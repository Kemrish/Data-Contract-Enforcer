kind: DataContract
apiVersion: v3.0.0
id: week4-brownfield-cartographer-lineage
info:
  title: Week 4 Brownfield Cartographer — Lineage Snapshots
  version: 1.0.0
  owner: week4-brownfield-cartographer
  description: Graph snapshots (nodes/edges) used by Week 7 attribution and blast-radius
    enrichment.
  contact:
    name: Data platform owner
    email: data-contracts@example.com
terms:
  usage: Internal inter-system data contract. Not for external publication.
  limitations: git_commit is 40 hex chars. edge endpoints must exist in nodes[]. node_id
    uses type::path form.
servers:
  local:
    type: local
    path: C:/Users/Administrator/Desktop/Data Contract Enforcer/outputs/week4/lineage_snapshots.jsonl
    format: jsonl
schema:
  snapshot_id:
    type: string
    required: true
    description: Observed field `snapshot_id` from flattened JSONL profile.
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    enum:
    - f513a016-9add-467a-b38e-b716e0150bf6
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 1.0
      dominant_pattern: uuid_like
  git_commit:
    type: string
    required: true
    description: 40-character Git commit SHA (hex).
    pattern: ^[a-f0-9]{40}$
    enum:
    - 7be2c5838dbdeca8e915d4e46db70e910753d7f6
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
    downstream_consumers:
    - subscriber_id: week7-violation-attributor
      fields_consumed: &id001
      - edges
      - git_commit
      - nodes
      breaking_if_changed: &id002
      - edges.source
      - edges.target
      - git_commit
      source: contract_registry,default
  captured_at:
    type: string
    required: true
    description: Observed field `captured_at` from flattened JSONL profile.
    format: date-time
    enum:
    - '2026-04-03T17:51:24Z'
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  codebase_root:
    type: string
    required: true
    description: Observed field `codebase_root` from flattened JSONL profile.
    enum:
    - C:\Users\ADMINI~1\AppData\Local\Temp\cartographer_svfcwnxn
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  node_id:
    type: string
    required: true
    description: Stable node identifier (type::path or type::label).
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  node_type:
    type: string
    required: true
    description: Observed field `node_type` from flattened JSONL profile.
    enum:
    - DATASET
    - PIPELINE
    - FILE
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  node_label:
    type: string
    required: true
    description: Observed field `node_label` from flattened JSONL profile.
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  metadata_path:
    type: string
    required: true
    description: Observed field `metadata_path` from flattened JSONL profile.
    string_shape:
      alnum_prefix_ratio: 1.0
      looks_like_url_or_path_ratio: 0.0
      looks_like_uuid_ratio: 0.0
      dominant_pattern: alphanumeric_text
  metadata_language:
    type: string
    required: false
    description: Observed field `metadata_language` from flattened JSONL profile.
  edge_count_estimate:
    type: integer
    required: true
    description: Observed field `edge_count_estimate` from flattened JSONL profile.
    stats:
      min: 31.0
      max: 31.0
      mean: 31.0
      p25: 31.0
      p50: 31.0
      p75: 31.0
      p95: 31.0
      p99: 31.0
      stddev: 0.0
  node_count_estimate:
    type: integer
    required: true
    description: Observed field `node_count_estimate` from flattened JSONL profile.
    stats:
      min: 34.0
      max: 34.0
      mean: 34.0
      p25: 34.0
      p50: 34.0
      p75: 34.0
      p95: 34.0
      p99: 34.0
      stddev: 0.0
schema_annotations:
  node_id:
    business_meaning: Lineage node identity for graph traversal.
profiling_alerts: []
quality:
  type: SodaChecks
  specification:
    checks for dataset:
    - missing_count(snapshot_id) = 0
    - accepted_values(snapshot_id) in [f513a016-9add-467a-b38e-b716e0150bf6]
    - missing_count(git_commit) = 0
    - accepted_values(git_commit) in [7be2c5838dbdeca8e915d4e46db70e910753d7f6]
    - missing_count(captured_at) = 0
    - accepted_values(captured_at) in [2026-04-03T17:51:24Z]
    - missing_count(codebase_root) = 0
    - accepted_values(codebase_root) in [C:\Users\ADMINI~1\AppData\Local\Temp\cartographer_svfcwnxn]
    - missing_count(node_id) = 0
    - missing_count(node_type) = 0
    - accepted_values(node_type) in [DATASET,PIPELINE,FILE]
    - missing_count(node_label) = 0
    - missing_count(metadata_path) = 0
    - missing_count(edge_count_estimate) = 0
    - missing_count(node_count_estimate) = 0
lineage:
  upstream: []
  downstream:
  - id: week7-violation-attributor
    fields_consumed: *id001
    breaking_if_changed: *id002
    description: Blame chain and blast-radius enrichment.
    source: contract_registry,default
    breaking_field_reasons:
      edges.source: graph traversal for blame chain
      edges.target: graph traversal for blast radius enrichment
