kind: DataContract
apiVersion: v3.0.0
id: week1-intent-code-correlator-intents
info:
  title: Week 1 Intent–Code Correlator — Intent Records
  version: 1.0.0
  owner: week1-intent-correlator
  description: JSONL of intent statements with linked code references used by the
    Digital Courtroom and downstream governance.
  contact:
    name: Data platform owner
    email: data-contracts@example.com
terms:
  usage: Internal inter-system data contract. Not for external publication.
  limitations: code_refs.confidence is 0.0–1.0. created_at is ISO-8601 Z. code_refs
    must be non-empty.
servers:
  local:
    type: local
    path: C:/Users/Administrator/Desktop/Data Contract Enforcer/outputs/week1/intent_records.jsonl
    format: jsonl
schema:
  intent_id:
    type: string
    required: true
    description: Observed field `intent_id` from flattened JSONL profile.
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    downstream_consumers:
    - subscriber_id: week2-digital-courtroom
      fields_consumed: &id001
      - code_refs
      - description
      - intent_id
      breaking_if_changed: &id002
      - code_refs.file
      - intent_id
      source: contract_registry,default
  description:
    type: string
    required: true
    description: Observed field `description` from flattened JSONL profile.
    downstream_consumers:
    - subscriber_id: week2-digital-courtroom
      fields_consumed: *id001
      breaking_if_changed: *id002
      source: contract_registry,default
  created_at:
    type: string
    required: true
    description: Observed field `created_at` from flattened JSONL profile.
    format: date-time
    enum:
    - '2026-03-30T12:09:06Z'
  governance_tags_json:
    type: string
    required: true
    description: Observed field `governance_tags_json` from flattened JSONL profile.
  code_ref_file:
    type: string
    required: true
    description: Observed field `code_ref_file` from flattened JSONL profile.
    enum:
    - src/week3/extractor.py
  code_ref_line_start:
    type: integer
    required: true
    description: 1-indexed line span in source file.
    stats:
      min: 10.0
      max: 10.0
      mean: 10.0
      p25: 10.0
      p50: 10.0
      p75: 10.0
      p95: 10.0
      p99: 10.0
      stddev: 0.0
  code_ref_line_end:
    type: integer
    required: true
    description: 1-indexed line span in source file.
    stats:
      min: 40.0
      max: 40.0
      mean: 40.0
      p25: 40.0
      p50: 40.0
      p75: 40.0
      p95: 40.0
      p99: 40.0
      stddev: 0.0
  code_ref_symbol:
    type: string
    required: true
    description: Observed field `code_ref_symbol` from flattened JSONL profile.
  code_ref_confidence:
    type: number
    required: true
    description: Confidence score for extracted facts. Must remain 0.0–1.0 float.
      BREAKING if rescaled to 0–100.
    minimum: 0.0
    maximum: 1.0
    stats:
      min: 0.9
      max: 0.9
      mean: 0.9
      p25: 0.9
      p50: 0.9
      p75: 0.9
      p95: 0.9
      p99: 0.9
      stddev: 0.0
schema_annotations:
  intent_id:
    business_meaning: Stable intent record key.
  code_ref_file:
    business_meaning: Repository-relative path for Digital Courtroom target_ref.
profiling_alerts: []
quality:
  type: SodaChecks
  specification:
    checks for dataset:
    - missing_count(intent_id) = 0
    - missing_count(description) = 0
    - missing_count(created_at) = 0
    - accepted_values(created_at) in [2026-03-30T12:09:06Z]
    - missing_count(governance_tags_json) = 0
    - missing_count(code_ref_file) = 0
    - accepted_values(code_ref_file) in [src/week3/extractor.py]
    - missing_count(code_ref_line_start) = 0
    - missing_count(code_ref_line_end) = 0
    - missing_count(code_ref_symbol) = 0
    - missing_count(code_ref_confidence) = 0
    - min(code_ref_confidence) >= 0.0
    - max(code_ref_confidence) <= 1.0
lineage:
  upstream: []
  downstream:
  - id: week2-digital-courtroom
    fields_consumed: *id001
    breaking_if_changed: *id002
    description: Verdict target_ref links to intent code_refs.
    source: contract_registry,default
    breaking_field_reasons:
      code_refs.file: verdict target_ref must resolve to producer file paths
